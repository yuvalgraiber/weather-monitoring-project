services:
  # Message Broker for asynchronous data buffering
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    networks:
      - weather-net

  # Search & Analytics engine for data persistence
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - weather-net

  # Visualization layer for dashboarding
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - weather-net

# 4. Logstash - ETL Pipeline
  # Extracts from RabbitMQ, Transforms (Timestamps), and Loads to Elasticsearch
  logstash:
    build: ./logstash  # Points to the directory containing your Logstash Dockerfile and .conf
    container_name: logstash
    depends_on:
      - rabbitmq
      - elasticsearch
    networks:
      - weather-net

  # 5. Python App - Weather Data Producer
  # Fetches weather data and injects it into RabbitMQ
  weather-app:
    build: ./python-app  # Points to the directory containing your Python Dockerfile and main.py
    container_name: weather-app
    depends_on:
      - rabbitmq
    env_file:
      - .env  # Injects your API Key and Target City into the container environment
    networks:
      - weather-net
    environment:
      - PYTHONUNBUFFERED=1

networks:
  weather-net:
    driver: bridge