input {
  # Input from RabbitMQ
  rabbitmq {
    host => "rabbitmq"
    queue => "weather_queue"
    durable => true
    key => "weather_queue"
    exclusive => false
    user => "guest"
    password => "guest"
  }
}

filter {
  # Parse the incoming JSON string
  json {
    source => "message"
  }

  # Transformation: Map the custom timestamp to the official @timestamp field
  # This ensures millisecond precision in Elasticsearch/Kibana
  date {
    match => [ "ingestion_timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  # Direct the processed data to Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "weather-data-%{+YYYY.MM.dd}"
  }

  # Debugging: Print processing results to the console
  stdout { codec => rubydebug }
}